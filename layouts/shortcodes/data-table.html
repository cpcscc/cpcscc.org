{{ $data := index $.Page.Params ( .Get 0 ) }}
<table class="data-table">
  <tr>
    <thead>
    {{- range ( index $data 0 ) }}
      {{- range . }}
      <th>{{ . }}</th>
      {{- end }}
    {{- end }}
    </thead>
  </tr>
  {{- range ( index $data 1 ) }}
  {{- range . }}
  <tr>
  {{- range . }}
    <td>{{ . | safeHTML }}</td>
  {{- end }}
  </tr>
  {{- end }}
  {{- end }}
</table>
